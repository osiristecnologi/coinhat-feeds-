<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Pulse PRO 🌍</title>

<style>
body {
 margin:0;
 font-family: Arial;
 background:#0b0b1a;
 color:white;
}

/* HEADER */
header {
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:12px;
 background:#111133;
}

.icon {
 font-size:26px;
 cursor:pointer;
}

/* SIDEBAR */
.sidebar {
 position:fixed;
 left:-300px;
 top:0;
 width:280px;
 height:100%;
 background:#111;
 padding:15px;
 transition:0.3s;
 overflow-y:auto;
}

.sidebar.open { left:0; }

.closeBtn {
 font-size:22px;
 cursor:pointer;
 margin-bottom:10px;
 display:inline-block;
}

/* CARDS */
.panel {
 display:flex;
 flex-wrap:wrap;
 padding:10px;
}

.card {
 background:#1a1a33;
 margin:10px;
 padding:15px;
 border-radius:12px;
 width:200px;
}

/* NEWS */
.news-item {
 background:#222244;
 margin:8px 0;
 padding:10px;
 border-radius:8px;
 font-size:13px;
}

/* TITLE */
.section-title {
 margin:15px;
 color:#00ffcc;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

 <span class="closeBtn" onclick="toggleMenu()">← Fechar</span>

 <h3>📰 News</h3>
 <div id="newsBox">Loading news...</div>

 <hr>

 <button onclick="loadMemes()">🚀 Top Memecoins</button>

</div>

<!-- HEADER -->
<header>
 <div class="icon" onclick="toggleMenu()">☰</div>
 <h3>Crypto PRO</h3>
 <div class="icon">🌍</div>
</header>

<!-- MARKET -->
<div class="section-title">Live Market</div>
<div class="panel" id="coins"></div>

<div class="section-title">🚀 Memecoins</div>
<div class="panel" id="extra"></div>

<script>

// ================= MENU =================
function toggleMenu(){
 document.getElementById("sidebar").classList.toggle("open");
}

// ================= MARKET =================
async function loadCoins(){
 const res = await fetch(
 "https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=10&page=1"
 );
 const data = await res.json();

 let box=document.getElementById("coins");
 box.innerHTML="";

 data.forEach(c=>{
  box.innerHTML+=`
  <div class="card">
    <h3>${c.symbol.toUpperCase()}</h3>
    <p>$${c.current_price}</p>
    <p style="color:${c.price_change_percentage_24h>0?'lime':'red'}">
    ${c.price_change_percentage_24h.toFixed(2)}%
    </p>
  </div>`;
 });
}

// ================= MEMECOINS (DEXSCREENER REAL HYPE) =================
async function loadMemes(){
 const res = await fetch(
 "https://api.dexscreener.com/latest/dex/search?q=pepe"
 );
 const data = await res.json();

 let box=document.getElementById("extra");
 box.innerHTML="";

 let pairs = data.pairs || [];

 pairs.slice(0,10).forEach(p=>{
  box.innerHTML+=`
  <div class="card">
    <h3>🚀 ${p.baseToken.symbol}</h3>
    <p>${p.baseToken.name}</p>
    <small>Price: $${p.priceUsd || "?"}</small>
  </div>`;
 });
}

// ================= NEWS (REAL + READY MENU) =================
async function loadNews(){
 const box=document.getElementById("newsBox");
 box.innerHTML="Loading...";

 try {
  const res = await fetch(
  "https://api.coingecko.com/api/v3/status_updates"
  );
  const data = await res.json();

  let news = data.status_updates.slice(0,3);

  if(news.length===0){
   box.innerHTML="No news available";
   return;
  }

  box.innerHTML="";

  news.forEach(n=>{
   box.innerHTML+=`
   <div class="news-item">
    📰 ${n.description.slice(0,100)}...
   </div>`;
  });

 } catch(e){
  box.innerHTML="News error";
 }
}

// INIT
loadCoins();
loadNews();
setInterval(loadCoins,15000);

</script>

</body>
</html>
