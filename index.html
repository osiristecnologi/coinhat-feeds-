<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoinHatFeeds 🌍</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background:#050814;
 color:#00ffd5;
}

header{
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:12px;
 background:#08122b;
 border-bottom:2px solid #00ffff;
}

.icon{
 font-size:26px;
 cursor:pointer;
}

/* SIDEBAR */
.sidebar{
 position:fixed;
 left:-320px;
 top:0;
 width:300px;
 height:100%;
 background:#06101f;
 padding:15px;
 transition:0.3s;
 overflow-y:auto;
}
.sidebar.open{left:0;}

.closeBtn{
 cursor:pointer;
 color:#00ffff;
 font-size:20px;
 display:block;
 margin-bottom:10px;
}

/* GRID */
.panel{
 display:flex;
 flex-wrap:wrap;
 padding:10px;
}

.card{
 background:#0b1a33;
 margin:10px;
 padding:15px;
 border-radius:12px;
 width:200px;
 border:1px solid #00ffff;
}

/* NEWS */
.news{
 background:#081f3a;
 margin:8px 0;
 padding:10px;
 border-left:3px solid #00ffff;
 font-size:13px;
}

/* TITLES */
.title{
 margin:15px;
 color:#00ffff;
 text-shadow:0 0 8px #00ffff;
}

/* LANG */
.lang{
 display:none;
 position:absolute;
 right:10px;
 top:55px;
 background:#08122b;
 padding:10px;
 border:1px solid #00ffff;
}
.lang button{
 display:block;
 margin:5px 0;
 background:none;
 border:1px solid #00ffff;
 color:#00ffd5;
 cursor:pointer;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

 <span class="closeBtn" onclick="toggleMenu()">← Fechar</span>

 <h3>📰 News</h3>
 <div id="newsBox">Loading...</div>

 <hr>

 <button onclick="loadMemes()">🚀 Memecoins</button>

</div>

<!-- HEADER -->
<header>
 <div class="icon" onclick="toggleMenu()">☰</div>
 <h3>CoinHatFeeds</h3>
 <div class="icon" onclick="toggleLang()">🌍</div>
</header>

<!-- LANG -->
<div class="lang" id="langBox">
 <button onclick="setLang('en')">EN</button>
 <button onclick="setLang('pt')">PT</button>
 <button onclick="setLang('es')">ES</button>
 <button onclick="setLang('zh')">ZH</button>
 <button onclick="setLang('ja')">JA</button>
 <button onclick="setLang('ar')">AR</button>
</div>

<!-- MAIN -->
<div class="title" id="tMarket">Live Market</div>
<div class="panel" id="coins"></div>

<div class="title" id="tMemes">Trending Memecoins</div>
<div class="panel" id="memes"></div>

<script>

let lang="en";

// ================= MENU =================
function toggleMenu(){
 document.getElementById("sidebar").classList.toggle("open");
}

function toggleLang(){
 let b=document.getElementById("langBox");
 b.style.display = b.style.display==="block"?"none":"block";
}

// ================= TRANSLATION =================
const t={
 en:{m:"Live Market",me:"Trending Memecoins"},
 pt:{m:"Mercado",me:"Memecoins em Alta"},
 es:{m:"Mercado",me:"Memecoins"},
 zh:{m:"市场",me:"迷因币"},
 ja:{m:"市場",me:"ミームコイン"},
 ar:{m:"السوق",me:"ميمكوين"}
};

function setLang(l){
 lang=l;
 document.getElementById("tMarket").innerText=t[l].m;
 document.getElementById("tMemes").innerText=t[l].me;
}

// ================= MARKET =================
async function loadCoins(){
 const res=await fetch(
 "https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=10&page=1"
 );
 const data=await res.json();

 let box=document.getElementById("coins");
 box.innerHTML="";

 data.forEach(c=>{
  box.innerHTML+=`
  <div class="card">
   <h3>${c.symbol.toUpperCase()}</h3>
   <p>$${c.current_price}</p>
   <p style="color:${c.price_change_percentage_24h>0?'#00ff00':'#ff0055'}">
   ${c.price_change_percentage_24h.toFixed(2)}%
   </p>
  </div>`;
 });
}

// ================= MEMECOINS (REAL TRENDING FIXED) =================
async function loadMemes(){
 const res=await fetch(
 "https://api.coingecko.com/api/v3/search/trending"
 );
 const data=await res.json();

 let box=document.getElementById("memes");
 box.innerHTML="";

 (data.coins||[]).slice(0,10).forEach(i=>{
  let c=i.item;

  box.innerHTML+=`
  <div class="card">
   <h3>🚀 ${c.symbol}</h3>
   <p>${c.name}</p>
   <small>#${c.market_cap_rank||"new"}</small>
  </div>`;
 });
}

// ================= NEWS (FIXED REAL 3 ITEMS) =================
async function loadNews(){
 const box=document.getElementById("newsBox");
 box.innerHTML="Loading...";

 try {
  const res=await fetch(
  "https://api.coingecko.com/api/v3/status_updates"
  );
  const data=await res.json();

  const news=(data.status_updates||[]).slice(0,3);

  box.innerHTML="";

  if(news.length===0){
   box.innerHTML="No news found";
   return;
  }

  news.forEach(n=>{
   box.innerHTML+=`
   <div class="news">
    📰 ${n.description.slice(0,120)}...
   </div>`;
  });

 } catch(e){
  box.innerHTML="News error";
 }
}

// INIT
loadCoins();
loadMemes();
loadNews();
setInterval(loadCoins,15000);

</script>

</body>
</html>
