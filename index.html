<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>coinhatfeeds</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f0f4ff;--white:#fff;
  --blue:#1a6bff;--blue-dark:#1251cc;--blue-light:#e8f0ff;
  --green:#00e676;--green-dark:#00b85c;--green-light:#e0fff0;
  --red:#ff3d71;--text:#0d1b3e;--muted:#6b7fa8;
  --border:rgba(26,107,255,0.12);--shadow:0 4px 24px rgba(26,107,255,0.10);
  --radius:20px;--radius-sm:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* HEADER */
header{
  position:sticky;top:0;z-index:100;
  background:rgba(255,255,255,0.93);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;height:64px;
  box-shadow:0 2px 16px rgba(26,107,255,0.07);
}
.logo{
  font-family:'Syne',sans-serif;font-size:1.25rem;font-weight:800;
  background:linear-gradient(135deg,var(--blue),var(--green-dark));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:-0.5px;white-space:nowrap;
}
.header-left{display:flex;align-items:center;gap:12px;}
.header-right{display:flex;align-items:center;gap:12px;}
.icon-btn{
  background:var(--white);border:1.5px solid var(--border);border-radius:50%;
  width:42px;height:42px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:1.1rem;transition:all 0.2s;
  box-shadow:0 2px 8px rgba(26,107,255,0.08);position:relative;
}
.icon-btn:hover{border-color:var(--blue);transform:scale(1.08);box-shadow:0 4px 16px rgba(26,107,255,0.18);}
.notif-dot{position:absolute;top:6px;right:6px;width:8px;height:8px;background:var(--green);border-radius:50%;border:2px solid white;}

/* SEARCH */
.search-wrap{flex:1;max-width:340px;margin:0 16px;position:relative;}
.search-wrap input{
  width:100%;padding:10px 16px 10px 40px;
  border:1.5px solid var(--border);border-radius:50px;
  background:var(--blue-light);font-family:'DM Sans',sans-serif;
  font-size:0.9rem;color:var(--text);outline:none;transition:all 0.2s;
}
.search-wrap input:focus{border-color:var(--blue);background:white;box-shadow:0 0 0 3px rgba(26,107,255,0.12);}
.search-wrap input::placeholder{color:var(--muted);}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:1rem;pointer-events:none;}
#search-results{
  position:absolute;top:calc(100% + 8px);left:0;right:0;
  background:white;border-radius:var(--radius-sm);
  box-shadow:0 8px 32px rgba(26,107,255,0.15);border:1px solid var(--border);
  overflow:hidden;display:none;z-index:200;max-height:360px;overflow-y:auto;
}
#search-results.active{display:block;}
.sr-item{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;transition:background 0.15s;}
.sr-item:hover{background:var(--blue-light);}
.sr-logo{width:32px;height:32px;border-radius:50%;object-fit:cover;background:var(--blue-light);}
.sr-name{font-weight:600;font-size:0.9rem;}
.sr-pair{font-size:0.75rem;color:var(--muted);}
.sr-price{margin-left:auto;font-weight:600;font-size:0.88rem;}
.sr-chg{font-size:0.75rem;font-weight:600;}
.sr-chg.pos{color:var(--green-dark);}
.sr-chg.neg{color:var(--red);}

/* LANG */
.lang-dropdown{position:relative;}
.lang-menu{
  display:none;position:absolute;top:calc(100% + 8px);right:0;
  background:white;border-radius:var(--radius-sm);
  box-shadow:0 8px 32px rgba(26,107,255,0.15);border:1px solid var(--border);
  min-width:160px;overflow:hidden;z-index:300;
}
.lang-menu.active{display:block;}
.lang-opt{padding:11px 18px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:0.9rem;transition:background 0.15s;}
.lang-opt:hover{background:var(--blue-light);}
.lang-opt.selected{color:var(--blue);font-weight:600;}

/* NEWS PANEL */
.news-panel{
  position:fixed;top:0;left:-380px;height:100vh;width:360px;
  background:white;box-shadow:4px 0 32px rgba(26,107,255,0.15);
  border-radius:0 var(--radius) var(--radius) 0;
  z-index:500;transition:left 0.35s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;overflow:hidden;
}
.news-panel.open{left:0;}
.overlay{display:none;position:fixed;inset:0;background:rgba(13,27,62,0.25);z-index:490;backdrop-filter:blur(2px);}
.overlay.active{display:block;}
.news-header{
  padding:24px 20px 16px;background:linear-gradient(135deg,var(--blue),#0040cc);
  color:white;display:flex;justify-content:space-between;align-items:center;
}
.news-header h2{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:700;}
.news-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px;}
.news-card{border-radius:var(--radius-sm);border:1.5px solid var(--border);overflow:hidden;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;background:white;}
.news-card:hover{transform:translateY(-2px);box-shadow:var(--shadow);}
.news-img{width:100%;height:130px;object-fit:cover;background:var(--blue-light);}
.news-info{padding:12px 14px;}
.news-source{font-size:0.7rem;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px;}
.news-title{font-family:'Syne',sans-serif;font-size:0.92rem;font-weight:700;line-height:1.35;margin-bottom:6px;}
.news-date{font-size:0.72rem;color:var(--muted);}
.sk{background:linear-gradient(90deg,#eef2ff 25%,#dce6ff 50%,#eef2ff 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;}
.sk-img{height:120px;}
.sk-line{height:14px;margin:8px 14px;border-radius:6px;}
.sk-line.short{width:60%;}
.news-skeleton{border-radius:var(--radius-sm);overflow:hidden;border:1.5px solid var(--border);}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* MAIN */
main{padding:24px 16px;max-width:1200px;margin:0 auto;}
.section-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;margin-bottom:6px;display:flex;align-items:center;gap:10px;}
.section-title img{width:38px;height:38px;border-radius:50%;object-fit:cover;box-shadow:0 2px 8px rgba(0,0,0,0.12);}
.section-sub{color:var(--muted);font-size:0.88rem;margin-bottom:20px;}

/* MEME GRID */
.meme-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.meme-card{
  background:white;border-radius:var(--radius);border:1.5px solid var(--border);
  padding:18px 18px 14px;cursor:pointer;position:relative;
  transition:all 0.22s;box-shadow:0 2px 12px rgba(26,107,255,0.05);overflow:hidden;
}
.meme-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(26,107,255,0.03),rgba(0,230,118,0.03));opacity:0;transition:opacity 0.2s;}
.meme-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(26,107,255,0.14);border-color:var(--blue);}
.meme-card:hover::before{opacity:1;}
.meme-top{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.meme-logo{width:44px;height:44px;border-radius:50%;object-fit:cover;background:var(--blue-light);flex-shrink:0;}
.meme-name{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;}
.meme-sym{font-size:0.78rem;color:var(--muted);font-weight:500;}
.meme-badge{margin-left:auto;font-size:0.68rem;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:0.04em;text-transform:uppercase;}
.badge-new{background:var(--green-light);color:var(--green-dark);}
.badge-hot{background:#fff3e0;color:#e65100;}
.meme-price{font-family:'Syne',sans-serif;font-size:1.25rem;font-weight:800;}
.meme-chg{font-size:0.82rem;font-weight:700;margin-left:6px;}
.meme-chg.pos{color:var(--green-dark);}
.meme-chg.neg{color:var(--red);}
.meme-stats{display:flex;gap:12px;margin-top:8px;font-size:0.75rem;color:var(--muted);}
.meme-stat span{display:block;font-weight:600;color:var(--text);font-size:0.82rem;}
.meme-chart{height:52px;margin-top:12px;}
.meme-chart svg{width:100%;height:100%;}
.meme-skeleton{background:white;border-radius:var(--radius);border:1.5px solid var(--border);padding:18px;}
.sk-circle{width:44px;height:44px;border-radius:50%;}
.sk-block{height:52px;border-radius:10px;margin-top:12px;}

/* TICKER */
.ticker-bar{background:linear-gradient(90deg,var(--blue),#0040cc);color:white;overflow:hidden;height:34px;display:flex;align-items:center;}
.ticker-inner{display:flex;gap:40px;animation:tickerMove 35s linear infinite;white-space:nowrap;padding-left:100%;}
@keyframes tickerMove{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.ticker-item{font-size:0.78rem;font-weight:600;display:flex;align-items:center;gap:7px;}
.ticker-chg.pos{color:var(--green);}
.ticker-chg.neg{color:#ff8a80;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(13,27,62,0.3);z-index:600;backdrop-filter:blur(4px);align-items:center;justify-content:center;}
.modal-overlay.active{display:flex;}
.modal{background:white;border-radius:var(--radius);width:90%;max-width:520px;box-shadow:0 24px 80px rgba(26,107,255,0.22);overflow:hidden;animation:pop 0.28s cubic-bezier(.4,0,.2,1);}
@keyframes pop{from{transform:scale(0.88);opacity:0}to{transform:scale(1);opacity:1}}
.modal-head{background:linear-gradient(135deg,var(--blue),#0040cc);padding:22px 22px 18px;display:flex;align-items:center;gap:14px;color:white;}
.modal-logo{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,0.2);object-fit:cover;}
.modal-name{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;}
.modal-sym{font-size:0.82rem;opacity:0.8;}
.modal-close-btn{margin-left:auto;background:rgba(255,255,255,0.2);border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;color:white;font-size:1rem;display:flex;align-items:center;justify-content:center;}
.modal-close-btn:hover{background:rgba(255,255,255,0.35);}
.modal-body{padding:20px 22px;}
.modal-price{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;margin-bottom:4px;}
.modal-row{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
.modal-stat{flex:1;min-width:100px;background:var(--blue-light);border-radius:12px;padding:10px 14px;}
.modal-stat label{font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:3px;}
.modal-stat value{font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;}
.modal-contract{background:var(--bg);border-radius:10px;padding:10px 14px;font-size:0.78rem;color:var(--muted);word-break:break-all;margin-bottom:16px;}
.modal-contract strong{color:var(--text);display:block;margin-bottom:2px;font-size:0.72rem;text-transform:uppercase;letter-spacing:0.06em;}
.modal-links{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
.modal-link{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:50px;font-size:0.82rem;font-weight:600;text-decoration:none;transition:all 0.2s;border:1.5px solid var(--border);background:white;cursor:pointer;}
.modal-link:hover{background:var(--blue);color:white;border-color:var(--blue);}
.modal-link.tw{border-color:#1da1f2;color:#1da1f2;}
.modal-link.tw:hover{background:#1da1f2;color:white;}
.modal-link.tg{border-color:#0088cc;color:#0088cc;}
.modal-link.tg:hover{background:#0088cc;color:white;}
.modal-link.web{border-color:var(--green-dark);color:var(--green-dark);}
.modal-link.web:hover{background:var(--green-dark);color:white;}

/* CHART TABS */
.chart-tabs{display:flex;gap:6px;margin-bottom:10px;}
.chart-tab{padding:5px 14px;border-radius:50px;font-size:0.75rem;font-weight:700;border:1.5px solid var(--border);background:white;cursor:pointer;transition:all 0.15s;color:var(--muted);}
.chart-tab.active{background:var(--blue);color:white;border-color:var(--blue);}
.modal-chart{height:100px;border-radius:12px;overflow:hidden;background:var(--bg);position:relative;}
.modal-chart svg{width:100%;height:100%;}

/* DEX IFRAME OVERLAY */
.dex-overlay-wrap{position:relative;width:100%;height:0;overflow:hidden;border-radius:12px;margin-top:8px;}
.dex-overlay-wrap.open{height:300px;}
.dex-iframe{width:100%;height:100%;border:none;border-radius:12px;}
.dex-cover{
  position:absolute;bottom:0;left:0;right:0;height:38px;
  background:white;z-index:10;display:flex;align-items:center;justify-content:center;
  border-top:1px solid var(--border);
}
.dex-cover-top{
  position:absolute;top:0;left:0;right:0;height:48px;
  background:white;z-index:10;display:flex;align-items:center;padding:0 14px;gap:8px;
  border-bottom:1px solid var(--border);
}
.dex-cover-top span{font-size:0.78rem;color:var(--muted);}
.dex-btn{padding:5px 14px;border-radius:50px;font-size:0.75rem;font-weight:700;border:1.5px solid var(--blue);color:var(--blue);background:white;cursor:pointer;transition:all 0.15s;}
.dex-btn:hover{background:var(--blue);color:white;}
.dex-toggle-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:50px;font-size:0.82rem;font-weight:600;border:1.5px solid var(--blue);color:var(--blue);background:white;cursor:pointer;transition:all 0.2s;}
.dex-toggle-btn:hover{background:var(--blue);color:white;}

/* LIVE */
.live{display:inline-flex;align-items:center;gap:6px;font-size:0.72rem;color:var(--green-dark);font-weight:700;}
.live-dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.5)}}

/* SPINNER */
.spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(26,107,255,0.2);border-top-color:var(--blue);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── CHATBOT FLOAT ── */
.chat-fab{
  position:fixed;bottom:28px;right:28px;z-index:800;
  width:58px;height:58px;border-radius:50%;
  background:linear-gradient(135deg,var(--blue),var(--green-dark));
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;
  box-shadow:0 6px 24px rgba(26,107,255,0.35);
  transition:transform 0.2s,box-shadow 0.2s;
}
.chat-fab:hover{transform:scale(1.1);box-shadow:0 10px 32px rgba(26,107,255,0.45);}
.chat-fab .fab-badge{
  position:absolute;top:2px;right:2px;
  background:var(--red);color:white;border-radius:50%;
  width:18px;height:18px;font-size:0.6rem;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  border:2px solid white;
}

.chat-window{
  position:fixed;bottom:100px;right:28px;z-index:800;
  width:340px;max-height:480px;
  background:white;border-radius:var(--radius);
  box-shadow:0 16px 56px rgba(26,107,255,0.20);
  border:1px solid var(--border);
  display:none;flex-direction:column;overflow:hidden;
  animation:popUp 0.25s cubic-bezier(.4,0,.2,1);
}
.chat-window.open{display:flex;}
@keyframes popUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.chat-head{
  background:linear-gradient(135deg,var(--blue),#0040cc);
  padding:14px 18px;color:white;
  display:flex;align-items:center;gap:10px;
}
.chat-head-avatar{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;font-size:1.1rem;}
.chat-head-name{font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;}
.chat-head-sub{font-size:0.7rem;opacity:0.8;}
.chat-head-close{margin-left:auto;background:rgba(255,255,255,0.2);border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;color:white;font-size:0.9rem;display:flex;align-items:center;justify-content:center;}

.chat-messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;min-height:200px;}
.chat-msg{max-width:82%;padding:10px 14px;border-radius:16px;font-size:0.85rem;line-height:1.45;}
.chat-msg.bot{background:var(--blue-light);color:var(--text);border-bottom-left-radius:4px;align-self:flex-start;}
.chat-msg.user{background:var(--blue);color:white;border-bottom-right-radius:4px;align-self:flex-end;}
.chat-msg.typing{background:var(--blue-light);align-self:flex-start;padding:12px 16px;}
.typing-dots span{display:inline-block;width:6px;height:6px;background:var(--muted);border-radius:50%;margin:0 2px;animation:bounce 1.2s ease-in-out infinite;}
.typing-dots span:nth-child(2){animation-delay:0.2s;}
.typing-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

.chat-input-row{display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--border);}
.chat-input{flex:1;border:1.5px solid var(--border);border-radius:50px;padding:9px 16px;font-family:'DM Sans',sans-serif;font-size:0.85rem;outline:none;transition:border 0.2s;}
.chat-input:focus{border-color:var(--blue);}
.chat-send{background:var(--blue);border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:white;font-size:1rem;transition:background 0.2s;flex-shrink:0;}
.chat-send:hover{background:var(--blue-dark);}
.chat-suggestions{display:flex;flex-wrap:wrap;gap:6px;padding:0 14px 10px;}
.chat-sug{padding:5px 12px;border-radius:50px;font-size:0.72rem;font-weight:600;border:1.5px solid var(--blue);color:var(--blue);background:white;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.chat-sug:hover{background:var(--blue);color:white;}

::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(26,107,255,0.25);border-radius:3px;}

@media(max-width:520px){
  .logo{font-size:1rem;}
  .search-wrap{max-width:160px;}
  .meme-grid{grid-template-columns:1fr 1fr;gap:10px;}
  .meme-card{padding:12px;}
  .chat-window{width:calc(100vw - 32px);right:16px;}

  const img=titleEl.querySelector('img');
  titleEl.innerHTML='';
  if(img)titleEl.appendChild(img);

  document.getElementById('nt-sub').innerHTML=t.sub+' · <span class="live"><span class="live-dot"></span>LIVE</span>';

  document.getElementById('nt-vol').textContent=t.vol;
  document.getElementById('nt-liq').textContent=t.liq;
  document.getElementById('nt-mc').textContent=t.mc;
  document.getElementById('nt-contract').textContent=t.contract;
  document.getElementById('searchInput').placeholder=t.search;
  document.getElementById('dexBtnLabel').textContent=t.chartBtn;
  document.getElementById('botName').textContent=t.botName;
  document.getElementById('botSub').textContent=t.botSub;
  document.getElementById('chatInput').placeholder=t.botPh;
  // rebuild suggestions
  const sugsEl=document.getElementById('chatSugs');sugsEl.innerHTML='';
  t.sugs.forEach(s=>{
    const b=document.createElement('button');b.className='chat-sug';b.textContent=s;
    b.onclick=()=>sendSug(b);sugsEl.appendChild(b);
  });
  document.querySelectorAll('.lang-opt').forEach(o=>o.classList.remove('selected'));
  if(el)el.classList.add('selected');
  document.getElementById('langMenu').classList.remove('active');
}
function toggleLang(){document.getElementById('langMenu').classList.toggle('active');}
document.addEventListener('click',e=>{
  if(!e.target.closest('.lang-dropdown'))document.getElementById('langMenu').classList.remove('active');
  if(!e.target.closest('.search-wrap'))document.getElementById('search-results').classList.remove('active');
});

function getNewsImg(idx){return NEWS_IMAGES[idx%NEWS_IMAGES.length];}

function getSourceColor(src){
  for(const k of Object.keys(NEWS_SOURCE_COLORS)){
    if(src&&src.toLowerCase().includes(k.toLowerCase())) return NEWS_SOURCE_COLORS[k];
  }
  return NEWS_SOURCE_COLORS.default;
}

function escapeHtml(str=''){
  return String(str).replace(/[&<>"']/g,m=>({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    '"':'&quot;',
    "'":'&#039;'
  }[m]));
}

function stripHtml(html=''){
  const div=document.createElement('div');
  div.innerHTML=html;
  return (div.textContent||div.innerText||'').replace(/\s+/g,' ').trim();
}

function truncate(str='',max=140){
  const s=String(str).trim();
  return s.length>max ? s.slice(0,max-1)+'…' : s;
}

function timeAgo(iso){
  try{
    const diff=Date.now()-new Date(iso).getTime();
    const m=Math.floor(diff/60000);
    if(m<1)return'agora mesmo';
    if(m<60)return`há ${m}min`;
    const h=Math.floor(m/60);
    if(h<24)return`há ${h}h`;
    return`há ${Math.floor(h/24)}d`;
  }catch{return'recente';}
}

async function fetchJSON(url,timeout=8000){
  const ctrl=new AbortController();
  const t=setTimeout(()=>ctrl.abort(),timeout);
  try{
    const res=await fetch(url,{signal:ctrl.signal,cache:'no-store'});
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  }finally{
    clearTimeout(t);
  }
}

async function fetchRssFeed(feed){
  try{
    const rssUrl=`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed.url)}&count=${NEWS_CONFIG.maxRssPerFeed}`;
    const data=await fetchJSON(rssUrl,8000);
    return (data.items||[]).slice(0,NEWS_CONFIG.maxRssPerFeed).map(item=>({
      title:truncate(stripHtml(item.title||''),120),
      source:feed.source,
      summary:truncate(stripHtml(item.description||item.content||item.contentSnippet||''),180),
      url:item.link||'#',
      publishedAt:item.pubDate?new Date(item.pubDate).toISOString():'',
      topic:feed.topic,
      origin:'rss'
    }));
  }catch{
    return [];
  }
}

async function fetchTwitterTopic(cfg){
  try{
    const url=`${NEWS_CONFIG.twitterProxy}?topic=${encodeURIComponent(cfg.topic)}&q=${encodeURIComponent(cfg.query)}&limit=${NEWS_CONFIG.maxTwitterPerTopic}`;
    const data=await fetchJSON(url,8000);
    return (Array.isArray(data)?data:[]).slice(0,NEWS_CONFIG.maxTwitterPerTopic).map(item=>({
      title:truncate(stripHtml(item.title||item.summary||''),120),
      source:item.source||`Twitter/X · ${cfg.topic}`,
      summary:truncate(stripHtml(item.summary||item.title||''),180),
      url:item.url||'https://x.com',
      publishedAt:item.publishedAt||'',
      topic:cfg.topic,
      origin:'twitter'
    }));
  }catch{
    return [];
  }
}

function dedupeNews(items=[]){
  const map=new Map();
  items.forEach(item=>{
    const key=((item.url||'')+'|'+(item.title||'')).toLowerCase().trim();
    if(!key) return;
    if(!map.has(key)) map.set(key,item);
  });
  return [...map.values()];
}

function sortNews(items=[]){
  return items.sort((a,b)=>{
    const da=a.publishedAt?new Date(a.publishedAt).getTime():0;
    const db=b.publishedAt?new Date(b.publishedAt).getTime():0;
    return db-da;
  });
}

async function fetchLiveNews(){
  const body=document.getElementById('newsBody');
  const btn=document.getElementById('newsRefreshBtn');
  const ts=document.getElementById('newsTimestamp');

  btn.innerHTML='⏳ Buscando...';
  btn.disabled=true;
  body.innerHTML=newsSkeleton();

  try{
    const [rssResults,twitterResults]=await Promise.all([
      Promise.all(NEWS_CONFIG.rssFeeds.map(fetchRssFeed)),
      Promise.all(NEWS_CONFIG.twitterTopics.map(fetchTwitterTopic))
    ]);

    const combined=sortNews(
      dedupeNews([
        ...rssResults.flat(),
        ...twitterResults.flat()
      ])
    ).slice(0,NEWS_CONFIG.maxCombined);

    if(!combined.length) throw new Error('sem notícias');

    liveNews=combined;
    newsFetched=true;
    renderNews(combined);

    const now=new Date();
    ts.textContent=`Atualizado: ${now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}`;
  }catch(e){
    liveNews=fallbackNews();
    newsFetched=true;
    renderNews(liveNews);
    ts.textContent='Sem conexão completa — exibindo últimas notícias disponíveis';
  }finally{
    btn.innerHTML='↻ Atualizar';
    btn.disabled=false;
  }
}

  const body=document.getElementById('newsBody');
  body.innerHTML='';

  if(!articles||!articles.length){
    body.innerHTML='<div style="padding:24px;text-align:center;color:var(--muted);font-size:0.88rem;">Nenhuma notícia encontrada.</div>';
    return;
  }

  articles.forEach((n,idx)=>{
    const c=document.createElement('div');
    c.className='news-card';
    const color=getSourceColor(n.source);
    const ago=n.publishedAt?timeAgo(n.publishedAt):'recente';
    const img=getNewsImg(idx);
    const topicLabel=(n.topic||'geral').toUpperCase();

    c.onclick=()=>window.open(n.url||'https://coindesk.com','_blank');

    c.innerHTML=`
      <img class="news-img" src="${img}" alt="" onerror="this.style.background='#e8f0ff'"/>
      <div class="news-info">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;">
          <div class="news-source" style="color:${color}">${escapeHtml(n.source||'Crypto News')}</div>
          <div style="font-size:0.65rem;font-weight:700;padding:3px 8px;border-radius:999px;background:#eef3ff;color:#315efb;letter-spacing:.03em;">
            ${escapeHtml(topicLabel)}

        <div class="news-title">${escapeHtml(n.title||'Sem título')}</div>
        ${n.summary?`<div style="font-size:0.76rem;color:var(--muted);margin:4px 0 2px;line-height:1.35;">${escapeHtml(n.summary)}</div>`:''}
        <div class="news-date">🕐 ${escapeHtml(ago)}</div>
      </div>`;
    body.appendChild(c);
  });
}

function fmt(n){
  if(!n||isNaN(n))return'—';
  if(n>=1e9)return'$'+(n/1e9).toFixed(2)+'B';
  if(n>=1e6)return'$'+(n/1e6).toFixed(2)+'M';
  if(n>=1e3)return'$'+(n/1e3).toFixed(2)+'K';
  if(n>=1)return'$'+n.toFixed(4);
  return'$'+n.toPrecision(4);
}
function fmtChg(c){if(c==null)return'';return(c>=0?'+':'')+c.toFixed(2)+'%';}

let currentPair=null,currentTf='m5';
function miniChart(svgEl,pos,tf){
  const count=tf==='m5'?30:tf==='h1'?40:20;
  const volatility=tf==='m5'?8:tf==='h1'?18:30;
  const pts=Array.from({length:count},(_,i)=>{
    const trend=(pos?1:-1)*i*0.5;
    return{x:i,y:50+trend+(Math.random()-0.48)*volatility};
  });
  const xs=pts.map(p=>p.x),ys=pts.map(p=>p.y);
  const minY=Math.min(...ys),maxY=Math.max(...ys);
  const W=300,H=100;
  const toX=x=>(x/(count-1))*W;
  const toY=y=>H-((y-minY)/(maxY-minY||1))*(H-10)-5;
  const d='M '+pts.map(p=>`${toX(p.x)},${toY(p.y)}`).join(' L ');
  const col=pos?'#00b85c':'#ff3d71';
  const gid='g'+Math.random().toString(36).slice(2);
  svgEl.innerHTML=`<defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="${col}" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="${col}" stop-opacity="0"/>
  </linearGradient></defs>
  <path d="${d} L ${W},${H} L 0,${H} Z" fill="url(#${gid})"/>
  <path d="${d}" fill="none" stroke="${col}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;
}

async function loadMemecoins(){
  if(!memeData.length){ memeData=FALLBACK; renderMemes(memeData); renderTicker(memeData); }
  if(loadingLive) return;
  loadingLive=true;

  try{
    const ctrl=new AbortController();
    setTimeout(()=>ctrl.abort(),8000);
    const res=await fetch('https://api.dexscreener.com/token-boosts/latest/v1',{signal:ctrl.signal});
    if(!res.ok) throw new Error('boost fail');
    const boosts=await res.json();
    const list=(Array.isArray(boosts)?boosts:boosts.data||[]).slice(0,20);
    if(!list.length) throw new Error('empty boosts');

    const details=await Promise.all(list.map(async item=>{
      if(!item.tokenAddress) return null;
      try{
        const c2=new AbortController();
        setTimeout(()=>c2.abort(),5000);
        const r=await fetch(`https://api.dexscreener.com/latest/dex/tokens/${item.tokenAddress}`,{signal:c2.signal});
        const d=await r.json();
        const pairs=(d.pairs||[]).filter(p=>p.priceUsd&&parseFloat(p.priceUsd)>0);
        if(!pairs.length) return null;
        pairs.sort((a,b)=>(b.liquidity?.usd||0)-(a.liquidity?.usd||0));
        const p=pairs[0];
        if(item.icon&&!p.info?.imageUrl){
          p.info=p.info||{};
          p.info.imageUrl=item.icon;
        }
        if(item.links&&(!p.info?.socials||!p.info.socials.length)){
          p.info=p.info||{};
          p.info.socials=(item.links||[]).map(l=>({type:l.type||l.label?.toLowerCase(),url:l.url}));
          p.info.websites=(item.links||[]).filter(l=>l.type==='website'||l.label==='Website').map(l=>({url:l.url}));
        }
        return p;
      }catch{return null;}
    }));

    const live=details.filter(p=>p&&p.priceUsd&&p.baseToken);
    if(live.length>=3){
      memeData=live;
      renderMemes(memeData);
      renderTicker(memeData);
    }
  }catch(e){
    console.log('API indisponível, usando fallback');
  }finally{
    loadingLive=false;
  }
}

/* ── UTILS ── */
function fmt(n){
  if(!n||isNaN(n))return'—';
  if(n>=1e9)return'$'+(n/1e9).toFixed(2)+'B';
  if(n>=1e6)return'$'+(n/1e6).toFixed(2)+'M';
  if(n>=1e3)return'$'+(n/1e3).toFixed(2)+'K';
  if(n>=1)return'$'+n.toFixed(4);
  return'$'+n.toPrecision(4);
}
function fmtChg(c){if(c==null)return'';return(c>=0?'+':'')+c.toFixed(2)+'%';}

/* ── CHARTS (timeframe-aware) ── */
let currentPair=null,currentTf='m5';
function miniChart(svgEl,pos,tf){
  const count=tf==='m5'?30:tf==='h1'?40:20;
  const volatility=tf==='m5'?8:tf==='h1'?18:30;
  const pts=Array.from({length:count},(_,i)=>{
    const trend=(pos?1:-1)*i*0.5;
    return{x:i,y:50+trend+(Math.random()-0.48)*volatility};
  });
  const xs=pts.map(p=>p.x),ys=pts.map(p=>p.y);
  const minY=Math.min(...ys),maxY=Math.max(...ys);
  const W=300,H=100;
  const toX=x=>(x/(count-1))*W;
  const toY=y=>H-((y-minY)/(maxY-minY||1))*(H-10)-5;
  const d='M '+pts.map(p=>`${toX(p.x)},${toY(p.y)}`).join(' L ');
  const col=pos?'#00b85c':'#ff3d71';
  const gid='g'+Math.random().toString(36).slice(2);
  svgEl.innerHTML=`<defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="${col}" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="${col}" stop-opacity="0"/>
  </linearGradient></defs>
  <path d="${d} L ${W},${H} L 0,${H} Z" fill="url(#${gid})"/>
  <path d="${d}" fill="none" stroke="${col}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;
}
function switchTab(btn,tf){
  document.querySelectorAll('.chart-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentTf=tf;
  if(currentPair){
    const chg=currentPair.priceChange?.h24;
    setTimeout(()=>miniChart(document.getElementById('m-chart'),chg>=0,tf),0);
  }
}

        pairs.sort((a,b)=>(b.liquidity?.usd||0)-(a.liquidity?.usd||0));
        const p=pairs[0];
        // injeta dados do boost (imagem, links) se o par não tiver
        if(item.icon&&!p.info?.imageUrl){
          p.info=p.info||{};
          p.info.imageUrl=item.icon;
        }
        if(item.links&&(!p.info?.socials||!p.info.socials.length)){
          p.info=p.info||{};
          p.info.socials=(item.links||[]).map(l=>({type:l.type||l.label?.toLowerCase(),url:l.url}));
          p.info.websites=(item.links||[]).filter(l=>l.type==='website'||l.label==='Website').map(l=>({url:l.url}));
        }
        return p;
      }catch{return null;}
    }));

    const live=details.filter(p=>p&&p.priceUsd&&p.baseToken);
    if(live.length>=3){
      memeData=live;
      renderMemes(memeData);
      renderTicker(memeData);
    }
  }catch(e){
    console.log('API indisponível, usando fallback');
  }finally{
    loadingLive=false;
  }
}
function renderMemes(pairs){
  const grid=document.getElementById('memeGrid');grid.innerHTML='';
  pairs.forEach((pair,i)=>{
    const name=pair.baseToken?.name||'—',sym=pair.baseToken?.symbol||'—';
    const price=parseFloat(pair.priceUsd)||0,chg=pair.priceChange?.h24,pos=chg>=0;
    const card=document.createElement('div');card.className='meme-card';
    const bl=i<2?'badge-hot':i<6?'badge-new':'';
    const bl2=i<2?'🚀 Boost':i<6?'🆕 New':'';
    card.innerHTML=`
      <div class="meme-top">
        <img class="meme-logo" src="${pair.info?.imageUrl||''}" onerror="this.style.background='var(--blue-light)';this.src=''" alt=""/>
        <div><div class="meme-name">${name.length>14?name.slice(0,13)+'…':name}</div><div class="meme-sym">${sym}</div></div>
        ${bl2?`<span class="meme-badge ${bl}">${bl2}</span>`:''}
      </div>
      <div><span class="meme-price">${fmt(price)}</span><span class="meme-chg ${pos?'pos':'neg'}">${fmtChg(chg)}</span></div>
      <div class="meme-stats">
        <div>Vol 24h<span>${fmt(pair.volume?.h24)}</span></div>
        <div>Liq<span>${fmt(pair.liquidity?.usd)}</span></div>
        <div>MktCap<span>${fmt(pair.fdv)}</span></div>
      </div>
      <div class="meme-chart"><svg viewBox="0 0 300 52" preserveAspectRatio="none" id="chart-${i}"></svg></div>`;
    card.onclick=()=>openModal(pair);
    grid.appendChild(card);
    setTimeout(()=>miniChart(document.getElementById(`chart-${i}`),pos,'h1'),60*i);
  });
}
function renderTicker(pairs){
  const inner=document.getElementById('tickerInner');
  inner.innerHTML=[...pairs,...pairs].map(p=>{
    const chg=p.priceChange?.h24,pos=chg>=0;
    return`<span class="ticker-item">${p.baseToken?.symbol||'?'} ${fmt(parseFloat(p.priceUsd))} <span class="ticker-chg ${pos?'pos':'neg'}">${fmtChg(chg)}</span></span>`;
  }).join('');
}

/* ── MODAL ── */
function openModal(pair){
  currentPair=pair;
  currentTf='m5';

  // reset chart tabs
  document.querySelectorAll('.chart-tab').forEach((b,i)=>b.classList.toggle('active',i===0));

  // header
  const name=pair.baseToken?.name||'—';
  const sym=pair.baseToken?.symbol||'—';
  const price=parseFloat(pair.priceUsd)||0;
  const chg=pair.priceChange?.h24;
  const pos=(chg||0)>=0;

  document.getElementById('m-logo').src=pair.info?.imageUrl||'';
  document.getElementById('m-name').textContent=name;
  document.getElementById('m-sym').textContent=sym+' · '+(pair.chainId||'');
  document.getElementById('m-price').textContent=fmt(price);
  const ce=document.getElementById('m-chg');
  ce.textContent=fmtChg(chg);
  ce.className='meme-chg '+(pos?'pos':'neg');

  // stats
  document.getElementById('m-vol').textContent=fmt(pair.volume?.h24);
  document.getElementById('m-liq').textContent=fmt(pair.liquidity?.usd);
  document.getElementById('m-mc').textContent=fmt(pair.fdv);

  // contract
  document.getElementById('m-addr').textContent=pair.baseToken?.address||'—';

  // chart
  setTimeout(()=>miniChart(document.getElementById('m-chart'),pos,currentTf),50);

  // chart button label
  const t=i18n[lang]||i18n.pt;
  document.getElementById('dexBtnLabel').textContent=t.chartBtn;

  // social links
  const links=document.getElementById('m-links');
  links.innerHTML='';
  const addL=(cls,icon,label,url)=>{
    if(!url)return;
    const a=document.createElement('a');
    a.href=url;a.target='_blank';a.rel='noopener';
    a.className='modal-link '+cls;
    a.innerHTML=icon+' '+label;
    links.appendChild(a);
  };
  // support both socials array formats from DexScreener
  const socials=pair.info?.socials||[];
  const websites=pair.info?.websites||[];
  const tw=socials.find(s=>s.type==='twitter'||s.label==='Twitter');
  const tg=socials.find(s=>s.type==='telegram'||s.label==='Telegram');
  const web=websites[0]||socials.find(s=>s.type==='website'||s.label==='Website');
  addL('tw','🐦','Twitter',tw?.url);
  addL('tg','✈️','Telegram',tg?.url);
  addL('web','🌐','Website',web?.url);

  // show modal
  document.getElementById('tokenModal').classList.add('active');
}
function closeModal(){
  document.getElementById('tokenModal').classList.remove('active');
  currentPair=null;
}
document.getElementById('tokenModal').onclick=e=>{
  if(e.target===document.getElementById('tokenModal'))closeModal();
};

/* ── SEARCH ── */
let sTimeout;
async function onSearch(q){
  clearTimeout(sTimeout);
  if(!q||q.length<2){document.getElementById('search-results').classList.remove('active');return;}
  sTimeout=setTimeout(async()=>{
    const box=document.getElementById('search-results');
    box.innerHTML='<div style="padding:14px;text-align:center"><span class="spinner"></span></div>';
    box.classList.add('active');
    try{
      const res=await fetch(`https://api.dexscreener.com/latest/dex/search?q=${encodeURIComponent(q)}`);
      const data=await res.json();
      const pairs=(data.pairs||[]).slice(0,8);
      if(!pairs.length){box.innerHTML='<div style="padding:14px;color:var(--muted);font-size:.85rem">Nenhum resultado</div>';return;}
      window._sp=pairs;
      box.innerHTML=pairs.map((p,idx)=>{
        const chg=p.priceChange?.h24,pos=chg>=0;
        return`<div class="sr-item" onclick="selSearch(${idx})">
          <img class="sr-logo" src="${p.info?.imageUrl||''}" onerror="this.style.display='none'" alt=""/>
          <div><div class="sr-name">${p.baseToken?.symbol||'?'}</div><div class="sr-pair">${p.baseToken?.name||''}</div></div>
          <div style="margin-left:auto;text-align:right"><div class="sr-price">${fmt(parseFloat(p.priceUsd))}</div><div class="sr-chg ${pos?'pos':'neg'}">${fmtChg(chg)}</div></div>
        </div>`;
      }).join('');
    }catch{box.innerHTML='<div style="padding:14px;color:var(--muted);font-size:.85rem">Erro na busca</div>';}
  },400);
}
function selSearch(i){openModal(window._sp[i]);document.getElementById('search-results').classList.remove('active');document.getElementById('searchInput').value='';}
function showResults(){if(document.getElementById('search-results').children.length)document.getElementById('search-results').classList.add('active');}

/* ── CHATBOT multilingual ── */
let chatOpen=false;
function getBotReply(msg){
  const m=msg.toLowerCase();
  const kb=i18n[lang]?.kb||i18n.pt.kb;
  for(const e of kb){if(e.k.some(k=>m.includes(k)))return e.r;}
  return i18n[lang]?.def||i18n.pt.def;
}
function toggleChat(){
  chatOpen=!chatOpen;
  document.getElementById('chatWindow').classList.toggle('open',chatOpen);
  document.getElementById('chatBadge').style.display='none';
  if(chatOpen&&document.getElementById('chatMessages').children.length===0){
    addBotMsg(i18n[lang]?.botHello||i18n.pt.botHello);
  }
}
function addBotMsg(text){
  const msgs=document.getElementById('chatMessages');
  const d=document.createElement('div');d.className='chat-msg bot';d.textContent=text;
  msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;
}
function addUserMsg(text){
  const msgs=document.getElementById('chatMessages');
  const d=document.createElement('div');d.className='chat-msg user';d.textContent=text;
  msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;
}
function showTyping(){
  const msgs=document.getElementById('chatMessages');
  const d=document.createElement('div');d.className='chat-msg typing';d.id='typingDots';
  d.innerHTML='<div class="typing-dots"><span></span><span></span><span></span></div>';
  msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;
}
function hideTyping(){const d=document.getElementById('typingDots');if(d)d.remove();}
function sendChat(){
  const inp=document.getElementById('chatInput');
  const msg=inp.value.trim();if(!msg)return;
  inp.value='';addUserMsg(msg);
  document.getElementById('chatSugs').style.display='none';
  showTyping();
  setTimeout(()=>{hideTyping();addBotMsg(getBotReply(msg));},800+Math.random()*500);
}
function sendSug(btn){
  document.getElementById('chatInput').value=btn.textContent;sendChat();
}
