<script>
document.addEventListener("DOMContentLoaded", () => {

// ================= SAFE GET =================
function el(id){
 return document.getElementById(id);
}

// ================= MENU =================
window.toggleMenu = () => {
 el("sidebar")?.classList.toggle("open");
};

// ================= LANG =================
window.toggleLang = () => {
 let b = el("langBox");
 if(b) b.style.display = b.style.display==="block"?"none":"block";
};

// ================= TRADUÇÕES =================
const translations = {
 pt:{
  title:"🚀 Memecoins em Alta",
  news:"📰 Notícias",
  search:"Buscar contrato...",
  newsList:[
   "📰 Bitcoin dispara",
   "📰 Ethereum reduz taxas",
   "📰 Memecoins da Solana sobem"
  ]
 },
 en:{
  title:"🚀 Trending Memecoins",
  news:"📰 News",
  search:"Search contract...",
  newsList:[
   "📰 Bitcoin surges",
   "📰 Ethereum fees drop",
   "📰 Memecoins pumping"
  ]
 }
};

// ================= SET LANG =================
window.setLang = (lang)=>{
 const t = translations[lang];
 if(!t) return;

 if(el("title")) el("title").innerText = t.title;
 if(el("newsTitle")) el("newsTitle").innerText = t.news;
 if(el("search")) el("search").placeholder = t.search;

 document.querySelectorAll(".news-card").forEach((card,i)=>{
  if(t.newsList[i]) card.innerText = t.newsList[i];
 });

 if(el("langBox")) el("langBox").style.display="none";
};

// ================= SEARCH =================
let searchInput = el("search");

if(searchInput){
 searchInput.addEventListener("keydown", async (e)=>{
  if(e.key !== "Enter") return;

  let q=e.target.value.trim();
  if(!q) return;

  try{
   const res=await fetch(`https://api.dexscreener.com/latest/dex/tokens/${q}`);
   const data=await res.json();

   const box=el("memes");
   if(!box) return;

   box.innerHTML="";

   if(!data.pairs){
    box.innerHTML="Token não encontrado";
    return;
   }

   data.pairs.slice(0,5).forEach(p=>{
    box.innerHTML+=`
     <div class="card">
      <h3>${p.baseToken.symbol}</h3>
      <p>$${p.priceUsd || "?"}</p>
      <p>${p.baseToken.name}</p>
     </div>
    `;
   });

  }catch(err){
   console.log(err);
   el("memes").innerHTML="Erro na busca";
  }
 });
}

// ================= LOAD MEMES =================
async function loadMemes(){
 const box=el("memes");
 if(!box) return;

 box.innerHTML="Carregando...";

 try{
  const res=await fetch("https://api.coingecko.com/api/v3/search/trending");
  const data=await res.json();

  const ids = data.coins.slice(0,8).map(c=>c.item.id).join(",");

  const r = await fetch(
   `https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${ids}&sparkline=true`
  );

  const coins = await r.json();

  box.innerHTML="";

  coins.forEach(c=>{
   box.innerHTML+=`
    <div class="card">
     <h3>${c.symbol.toUpperCase()}</h3>
     <p>$${c.current_price}</p>
     <canvas id="c-${c.id}"></canvas>
    </div>
   `;

   setTimeout(()=>{
    draw(`c-${c.id}`,c.sparkline_in_7d.price);
   },50);
  });

 }catch(e){
  box.innerHTML="Erro ao carregar";
 }
}

// ================= CHART =================
function draw(id,data){
 const c=el(id);
 if(!c) return;

 const ctx=c.getContext("2d");
 c.width=220;
 c.height=60;

 let min=Math.min(...data);
 let max=Math.max(...data);

 ctx.strokeStyle="#00aaff";
 ctx.beginPath();

 data.forEach((p,i)=>{
  let x=i*(220/data.length);
  let y=60-((p-min)/(max-min))*60;
  i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
 });

 ctx.stroke();
}

// INIT
setLang("pt");
loadMemes();

});
</script>
