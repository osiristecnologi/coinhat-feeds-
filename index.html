<script>

/* ── i18n ── */
const i18n = {
  pt:{ title:'🐸 Memecoins em Destaque', sub:'Cotações e gráficos em tempo real', news:'📰 Crypto News', refresh:'Atualizar', vol:'Vol 24h', liq:'Liquidez', mc:'Mkt Cap', contract:'Contrato', search:'Buscar token...' },
  en:{ title:'🐸 Top Memecoins', sub:'Real-time prices and charts', news:'📰 Crypto News', refresh:'Refresh', vol:'Vol 24h', liq:'Liquidity', mc:'Mkt Cap', contract:'Contract', search:'Search token...' },
};

let lang = 'pt';

function setLang(l, el) {
  lang = l;
  const t = i18n[l];

  document.getElementById('nt-title').textContent = t.title;
  document.getElementById('nt-sub').innerHTML = t.sub + ' · <span class="live"><span class="live-dot"></span>LIVE</span>';
  document.getElementById('nt-news').textContent = t.news;
  document.getElementById('nt-refresh').textContent = t.refresh;
  document.getElementById('nt-vol').textContent = t.vol;
  document.getElementById('nt-liq').textContent = t.liq;
  document.getElementById('nt-mc').textContent = t.mc;
  document.getElementById('nt-contract').textContent = t.contract;
  document.getElementById('searchInput').placeholder = t.search;

  document.querySelectorAll('.lang-opt').forEach(x => x.classList.remove('selected'));
  if (el) el.classList.add('selected');

  toggleLang();
}

function toggleLang() {
  document.getElementById('langMenu').classList.toggle('active');
}

/* ── NEWS ── */
function openNews() {
  document.getElementById('newsPanel').classList.add('open');
  document.getElementById('overlay').classList.add('active');
}
function closeNews() {
  document.getElementById('newsPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('active');
}

/* ── UTILS ── */
function fmt(n) {
  if (!n || isNaN(n)) return '—';
  if (n >= 1e9) return '$' + (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6) return '$' + (n/1e6).toFixed(2) + 'M';
  if (n >= 1e3) return '$' + (n/1e3).toFixed(2) + 'K';
  return '$' + n.toFixed(4);
}

function fmtChg(c) {
  if (c == null) return '';
  return (c >= 0 ? '+' : '') + c.toFixed(2) + '%';
}

/* ── LOAD MEMECOINS ── */
let memeData = [];

async function loadMemecoins() {
  try {
    const res = await fetch('https://api.dexscreener.com/latest/dex/search?q=meme');
    const data = await res.json();

    memeData = (data.pairs || []).slice(0, 12);
    renderMemes(memeData);

  } catch {
    document.getElementById('memeGrid').innerHTML =
      '<p style="color:gray;padding:20px">Erro ao carregar dados</p>';
  }
}

function renderMemes(pairs) {
  const grid = document.getElementById('memeGrid');
  grid.innerHTML = '';

  pairs.forEach(pair => {

    const div = document.createElement('div');
    div.className = 'meme-card';

    div.innerHTML = `
      <div class="meme-name">${pair.baseToken?.name}</div>
      <div>${fmt(pair.priceUsd)}</div>
      <div>${fmtChg(pair.priceChange?.h24)}</div>
    `;

    div.onclick = () => openModal(pair);

    grid.appendChild(div);
  });
}

/* ── MODAL ── */
function openModal(pair) {

  document.body.style.overflow = 'hidden';

  document.getElementById('m-name').textContent = pair.baseToken?.name;
  document.getElementById('m-price').textContent = fmt(pair.priceUsd);

  document.getElementById('tokenModal').classList.add('active');
}

function closeModal() {
  document.body.style.overflow = '';
  document.getElementById('tokenModal').classList.remove('active');
}

/* ── SEARCH ── */
let timeout;

async function onSearch(q) {

  clearTimeout(timeout);

  if (!q || q.length < 2) return;

  timeout = setTimeout(async () => {

    const res = await fetch(`https://api.dexscreener.com/latest/dex/search?q=${q}`);
    const data = await res.json();

    const box = document.getElementById('search-results');

    box.innerHTML = data.pairs.slice(0, 5).map((p,i) => `
      <div onclick="selectSearch(${i})">
        ${p.baseToken.symbol}
      </div>
    `).join('');

    window._searchPairs = data.pairs;

  }, 400);
}

function selectSearch(i) {
  openModal(window._searchPairs[i]);
}

/* ── CHAT ── */
function toggleChat() {
  document.getElementById('chatWindow').classList.toggle('open');
}

function sendChat() {
  const input = document.getElementById('chatInput');
  const msg = input.value;

  if (!msg) return;

  const box = document.getElementById('chatMessages');

  box.innerHTML += `<div class="chat-msg user">${msg}</div>`;
  box.innerHTML += `<div class="chat-msg bot">Em desenvolvimento 😄</div>`;

  input.value = '';
}

/* ── INIT ── */
loadMemecoins();
setInterval(loadMemecoins, 30000);

</script>
